<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订阅 - SP500 数据服务</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background-color: #fff;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 30px;
        }
        .price-card {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            border: 1px solid #ddd;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .price {
            font-size: 36px;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 10px;
        }
        .billing-period {
            color: #666;
            margin-bottom: 20px;
        }
        .features {
            text-align: left;
            margin-bottom: 30px;
        }
        .feature-item {
            margin-bottom: 10px;
            padding-left: 20px;
            position: relative;
        }
        .feature-item:before {
            content: "✓";
            color: #27ae60;
            font-weight: bold;
            position: absolute;
            left: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }
        input[type="email"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #3498db;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>订阅服务</h1>
        <div class="price-card">
            <div class="price">$10</div>
            <div class="billing-period">每年</div>
        </div>
        
        <div class="features">
            <div class="feature-item">无限制访问 SP500 历史成分股数据</div>
            <div class="feature-item">通过 API 接口获取数据</div>
            <div class="feature-item">令牌管理功能</div>
            <div class="feature-item">安全的支付处理</div>
        </div>
        
        <form id="subscribeForm">
            <div class="form-group">
                <label for="email">邮箱</label>
                <input type="email" id="email" name="email" value="{{ user.email if user else '' }}" required>
            </div>
            <button type="button" id="subscribeBtn">立即订阅</button>
        </form>
        <div id="message" class="message" style="display: none;"></div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const subscribeBtn = document.getElementById('subscribeBtn');
            const message = document.getElementById('message');
            const email = document.getElementById('email');
            
            subscribeBtn.addEventListener('click', async function() {
                if (!email.value) {
                    showMessage('请输入邮箱', 'error');
                    return;
                }
                
                try {
                    const response = await fetch('/billing/create-checkout-session', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: new URLSearchParams({ email: email.value })
                    });
                    
                    const data = await response.json();
                    if (data.url) {
                        window.location.href = data.url;
                    } else {
                        showMessage('创建订阅会话失败', 'error');
                    }
                } catch (error) {
                    showMessage('订阅失败', 'error');
                }
            });
            
            function showMessage(text, type) {
                message.textContent = text;
                message.className = `message ${type}`;
                message.style.display = 'block';
            }
        });
    </script>
</body>
</html>
